- number: "I"
  title: Mitochondrial Bioenergetics
  icon: fa-bolt
  image: ETC.png
  image_alt: Electron transport chain model
  description: >-
    We investigate how living systems capture, conserve and spend energy.
    Our work spans respiratory chains, F<sub>o</sub>F<sub>1</sub> ATP synthase, mitochondrial physiology
    and ATP economy in yeast and animal cells.

- number: "II"
  title: Quantitative Physiology
  icon: fa-chart-line
  image: Bioreactor.jpeg
  image_alt: Laboratory bioreactor used for quantitative physiology
  description: >-
    We quantify how yeast and animal cells distribute resources and energy
    according to culture conditions and alternative feedstocks. Through
    controlled cultivation, extended off-gas analysis beyond O<sub>2</sub> and
    CO<sub>2</sub>, and analytical, quantitative analyses, we identify the
    principles behind cellular rates, yields and trade-offs.

- number: "III"
  title: Bioengineering
  icon: fa-dna
  image: bioengineering.png
  image_alt: Mitochondrial and nuclear genome bioengineering
  description: >-
    We translate quantitative understanding into more efficient cells and
    processes. Our work includes mitochondrial engineering through mtDNA
    editing in <em>Saccharomyces cerevisiae</em>, and nuclear-genome
    engineering coupled with mitochondrial targeting sequences. We develop and
    characterize yeast and animal cell factories under process-relevant
    conditions.
