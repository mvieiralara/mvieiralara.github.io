- date: July 2026
  title: BioEfficiency Lab identity launched
  text: >-
    The group adopts a new research identity centred on quantitative metabolism,
    bioenergetics and bioengineering.

- date: May 2025
  title: Tom Koelmans joins the group
  text: >-
    Tom starts a PhD project on off-gas spectroscopy for physiological and
    process biomarkers.

- date: October 2024
  title: Malte Marquardt starts his PhD
  text: >-
    Malte joins the group to engineer yeast mitochondrial DNA for improved
    energetic efficiency.
